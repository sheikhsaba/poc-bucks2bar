<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucks2Bar - Income & Expense Tracker</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">💰 Bucks2Bar</span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-5">
        <!-- Tab Navigation -->
        <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="data-tab" data-bs-toggle="tab" data-bs-target="#dataPanel" type="button" role="tab" aria-controls="dataPanel" aria-selected="true">
                    📊 Data
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="chart-tab" data-bs-toggle="tab" data-bs-target="#chartPanel" type="button" role="tab" aria-controls="chartPanel" aria-selected="false">
                    📈 Chart
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="mainTabContent">
            <!-- Data Tab -->
            <div class="tab-pane fade show active" id="dataPanel" role="tabpanel" aria-labelledby="data-tab">
                <h3 class="mb-4">Monthly Income & Expenses</h3>
                <div class="row" id="monthlyInputs"></div>
            </div>

            <!-- Chart Tab -->
            <div class="tab-pane fade" id="chartPanel" role="tabpanel" aria-labelledby="chart-tab">
                <h3 class="mb-4">Income vs Expenses Chart</h3>
                <div class="chart-container">
                    <!-- download button -->
                    <button id="downloadChart" class="btn btn-primary mb-3">
                      Download
                    </button>
                    <canvas id="incomeExpenseChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/form-handler.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/tab-manager.js"></script>
</body>
</html>
